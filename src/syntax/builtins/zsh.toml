[metadata]
name = "zsh"
display_name = "Zsh"
alias = ["zshell"]
filename = ["\\.zsh$"]
shebang = ["^#!.*\\bzsh(?:\\s|$)"]
comment_prefix = "#"
glyph = ""
glyph_color = "#89e051"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "<<-?\\s*['\"]?([A-Za-z_][A-Za-z0-9_]*)['\"]?"
tag = "string.escape"
context = { push = [{ name = "zsh_heredoc", capture = 1 }, "zsh_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "^([A-Za-z_][A-Za-z0-9_]*)[ \\t]*$"
tag = "string.escape"
context = { requires = ["zsh_heredoc"], payload_match = { name = "zsh_heredoc", capture = 1 }, pop = ["zsh_heredoc", "zsh_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = ".+"
tag = "string.heredoc"
context = { requires = ["zsh_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "\\$'"
tag = "string"
context = { push = ["zsh_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["zsh_ansi_single_quoted"], pop = ["zsh_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\]+"
tag = "string"
context = { requires = ["zsh_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["zsh_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["zsh_single_quoted"], pop = ["zsh_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["zsh_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "[^']+"
tag = "string"
context = { requires = ["zsh_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["zsh_double_quoted"], pop = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "punctuation"
context = { push = ["zsh_backtick"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "punctuation"
context = { requires = ["zsh_backtick"], pop = ["zsh_backtick"] }

[[rules]]
kind = "regex"
pattern = "[^`\\\\]+"
tag = "string"
context = { requires = ["zsh_backtick"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["zsh_backtick"] }

[[rules]]
kind = "injection"
context = { requires = ["zsh_backtick"] }
selector = { name = "zsh" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "\\$\\("
tag = "punctuation"
context = { push = ["zsh_command_sub"] }

[[rules]]
kind = "regex"
pattern = "\\)"
tag = "punctuation"
context = { requires = ["zsh_command_sub"], pop = ["zsh_command_sub"] }

[[rules]]
kind = "regex"
pattern = "[^\\)\\\\]+"
tag = "string"
context = { requires = ["zsh_command_sub"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["zsh_command_sub"] }

[[rules]]
kind = "injection"
context = { requires = ["zsh_command_sub"] }
selector = { name = "zsh" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "\\$\\(\\("
tag = "punctuation"
context = { push = ["zsh_arithmetic_sub"] }

[[rules]]
kind = "regex"
pattern = "\\)\\)"
tag = "punctuation"
context = { requires = ["zsh_arithmetic_sub"], pop = ["zsh_arithmetic_sub"] }

[[rules]]
kind = "regex"
pattern = "[^\\)\\\\]+"
tag = "string"
context = { requires = ["zsh_arithmetic_sub"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["zsh_arithmetic_sub"] }

[[rules]]
kind = "injection"
context = { requires = ["zsh_arithmetic_sub"] }
selector = { name = "zsh" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "\\$\\{[A-Za-z_][A-Za-z0-9_]*:[A-Za-z][^}]*\\}"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\\$\\{[A-Za-z_][A-Za-z0-9_]*(?::[^}]*)?\\}"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "[^\"\\\\$]+"
tag = "string"
context = { requires = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$\\{[A-Za-z_][A-Za-z0-9_]*:[A-Za-z][^}]*\\}"
tag = "variable"
context = { requires = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$\\{[A-Za-z_][A-Za-z0-9_]*(?::[^}]*)?\\}"
tag = "variable"
context = { requires = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$\\(\\([^)]+\\)\\)"
tag = "punctuation"
context = { requires = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$\\([^)]+\\)"
tag = "punctuation"
context = { requires = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"
context = { requires = ["zsh_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\*\\([^\\n)]*\\)"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\[\\[|\\]\\]|\\(\\(|\\)\\)"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:case|do|done|elif|else|esac|fi|for|function|if|in|repeat|select|then|until|while)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:autoload|compdef|declare|emulate|functions|local|setopt|typeset|unsetopt|whence|zmodload)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:true|false)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\];]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|==|!=|<=|>=|&&|\\|\\||=|[+\\-*/%=&|!<>^~?])"
tag = "operator"
