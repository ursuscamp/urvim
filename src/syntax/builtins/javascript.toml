[metadata]
name = "javascript"
display_name = "JavaScript"
alias = ["js"]
filename = ["\\.(js|mjs|cjs|jsx)$"]
shebang = ["^#!.*\\b(?:node(?:js)?|bun|deno)(?:\\s|$)"]
comment_prefix = "//"
glyph = ""
glyph_color = "#f1e05a"

[[rules]]
kind = "regex"
pattern = "//.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "/\\*"
tag = "comment"
context = { push = ["js_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*/"
tag = "comment"
context = { requires = ["js_block_comment"], pop = ["js_block_comment"] }

[[rules]]
kind = "regex"
pattern = "[^*]+"
tag = "comment"
context = { requires = ["js_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*"
tag = "comment"
context = { requires = ["js_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["js_string_double"], pop = ["js_string_double"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["js_string_double"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["js_string_double"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["js_string_double"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["js_string_single"], pop = ["js_string_single"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["js_string_single"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\]+"
tag = "string"
context = { requires = ["js_string_single"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["js_string_single"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "string"
context = { requires = ["js_template"], pop = ["js_template"] }

[[rules]]
kind = "regex"
pattern = "\\$\\{"
tag = "punctuation"
context = { requires = ["js_template"], pop = ["js_template"], push = ["js_template_expr"] }

[[rules]]
kind = "regex"
pattern = "\\}"
tag = "punctuation"
context = { requires = ["js_template_expr"], pop = ["js_template_expr"], push = ["js_template"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["js_template"] }

[[rules]]
kind = "regex"
pattern = "\\$"
tag = "string"
context = { requires = ["js_template"] }

[[rules]]
kind = "regex"
pattern = "[^`\\\\$]+"
tag = "string"
context = { requires = ["js_template"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "string"
context = { push = ["js_template"] }

[[rules]]
kind = "injection"
context = { requires = ["js_template_expr"] }
selector = { name = "javascript" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "/(?:\\\\.|[^/\\\\\\n])+/[dgimsuvy]*"
tag = "string"

[[rules]]
kind = "regex"
pattern = "\\b(?:0[xX][0-9A-Fa-f](?:_?[0-9A-Fa-f])*(?:n)?|0[oO][0-7](?:_?[0-7])*(?:n)?|0[bB][01](?:_?[01])*(?:n)?|(?:\\d(?:_?\\d)*(?:\\.\\d(?:_?\\d)*)?|\\.\\d(?:_?\\d)*)(?:[eE][+-]?\\d(?:_?\\d)*)?(?:n)?)\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "#[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\\b(?:as|async|await|break|case|catch|class|const|continue|debugger|default|delete|do|else|export|extends|finally|for|from|function|if|import|in|instanceof|let|new|return|super|switch|this|throw|try|typeof|var|void|while|with|yield)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:true|false|null|undefined|NaN|Infinity)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:Array|Boolean|Date|Error|Map|Number|Object|Promise|Set|String|Symbol|Uint8Array|[A-Z][A-Za-z0-9]*)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b[A-Za-z_][$A-Za-z0-9_]*\\b"
lookahead = "\\s*\\("
tag = "function"

[[rules]]
kind = "regex"
pattern = "\\b[$A-Za-z_][$A-Za-z0-9_]*\\b"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|!==|==|!=|<=|>=|=>|&&|\\|\\||\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
