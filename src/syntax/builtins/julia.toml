[metadata]
name = "julia"
display_name = "Julia"
alias = ["jl"]
filename = ["\\.jl$"]
shebang = ["^#!.*\\bjulia(?:\\s|$)"]

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "=#"
tag = "comment.block"
context = { requires = ["julia_block_comment"], pop = ["julia_block_comment"] }

[[rules]]
kind = "regex"
pattern = "#="
tag = "comment.block"
context = { push = ["julia_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { requires = ["julia_triple_string"], pop = ["julia_triple_string"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { push = ["julia_triple_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["julia_triple_string"] }

[[rules]]
kind = "regex"
pattern = "raw\"(?:[^\"\\\\\\n]|\\\\.)*\""
tag = "string"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["julia_string"], pop = ["julia_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["julia_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["julia_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["julia_string"] }

[[rules]]
kind = "regex"
pattern = "'(?:[^'\\\\\\n]|\\\\.)'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:begin|break|catch|const|continue|do|else|elseif|end|export|false|finally|for|function|global|if|import|let|local|macro|module|quote|return|struct|true|try|typeof|using|where|while)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "@[A-Za-z_][A-Za-z0-9_]*"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|missing|nothing|true)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:0x[0-9A-Fa-f_]+|0o[0-7_]+|0b[01_]+|\\d[\\d_]*(?:\\.\\d[\\d_]*)?(?:[eE][+-]?\\d[\\d_]*)?)\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_]*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|==|!=|<=|>=|=>|::|\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
