[metadata]
name = "makefile"
display_name = "Makefile"
alias = ["make"]
filename = ["^(?:makefile|gnumakefile|mk)$"]
shebang = []

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["make_double_string"], pop = ["make_double_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["make_double_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\n{}]+"
tag = "string"
context = { requires = ["make_double_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["make_double_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["make_single_string"], pop = ["make_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["make_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\\n]+"
tag = "string"
context = { requires = ["make_single_string"] }

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "\\$\\([^)]+\\)|\\$\\{[^}]+\\}"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "^\\s*(?:include|define|endef|ifeq|ifneq|ifdef|ifndef|else|endif|override|export|unexport|private|vpath)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "^\\s*[A-Za-z0-9_./%\\-]+\\s*(?::=|\\+=|\\?=|!=|=)"
tag = "operator"

[[rules]]
kind = "regex"
pattern = "^\\s*[A-Za-z0-9_./%\\-]+\\s*:"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],:=]"
tag = "punctuation"
