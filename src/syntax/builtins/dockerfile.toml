[metadata]
name = "dockerfile"
display_name = "Dockerfile"
alias = ["docker"]
filename = ["^dockerfile$"]
shebang = []
comment_prefix = "#"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "^\\s*(?:FROM|RUN|CMD|LABEL|MAINTAINER|EXPOSE|ENV|ARG|ADD|COPY|ENTRYPOINT|VOLUME|USER|WORKDIR|HEALTHCHECK|SHELL|STOPSIGNAL|ONBUILD)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\$\\{?[A-Za-z_][A-Za-z0-9_]*\\}?"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["docker_string"], pop = ["docker_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["docker_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["docker_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["docker_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["docker_single_string"], pop = ["docker_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["docker_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\\n]+"
tag = "string"
context = { requires = ["docker_single_string"] }

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],:=]"
tag = "punctuation"
