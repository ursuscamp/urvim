[metadata]
name = "markdown"
display_name = "Markdown"
alias = ["md"]
filename = ["\\.(md|markdown)$"]
shebang = []

[[rules]]
kind = "regex"
pattern = "^[ \\t]{0,3}(?:#{1,6})[ \\t]+.*$"
tag = "markup.heading"

[[rules]]
kind = "regex"
pattern = "^[ \\t]{0,3}=+[ \\t]*$"
tag = "markup.heading"

[[rules]]
kind = "regex"
pattern = "^[ \\t]{0,3}(?:[-*_][ \\t]*){3,}$"
tag = "markup.thematic_break"

[[rules]]
kind = "regex"
pattern = "^[ \\t]*>[ \\t]?.*$"
tag = "markup.quote"

[[rules]]
kind = "regex"
pattern = "^[ \\t]*(?:[-+*]|\\d+[.)])[ \\t]+.*$"
tag = "markup.list"

[[rules]]
kind = "regex"
pattern = "^[ \\t]{0,3}(```|~~~)[ \\t]*"
tag = "markup.code"
context = { push = [{ name = "markdown_code_fence", capture = 1 }, "markdown_code_fence_body"] }

[[rules]]
kind = "regex"
pattern = "^[ \\t]{0,3}(```|~~~)[ \\t]*$"
tag = "markup.code"
context = { requires = ["markdown_code_fence"], payload_match = { name = "markdown_code_fence", capture = 1 }, pop = ["markdown_code_fence", "markdown_code_fence_body"] }

[[rules]]
kind = "injection"
context = { requires = ["markdown_code_fence_body"] }
selector = { capture = "^[ \\t]*([A-Za-z0-9_+-]+)" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "^[ \\t]{4}.+$"
tag = "markup.code"

[[rules]]
kind = "regex"
pattern = "!\\[[^\\]]*\\]\\([^\\)]*\\)"
tag = "markup.link"

[[rules]]
kind = "regex"
pattern = "\\[[^\\]]*\\]\\([^\\)]*\\)"
tag = "markup.link"

[[rules]]
kind = "regex"
pattern = "!\\[[^\\]]*\\]\\[[^\\]]*\\]"
tag = "markup.link"

[[rules]]
kind = "regex"
pattern = "\\[[^\\]]*\\]\\[[^\\]]*\\]"
tag = "markup.link"

[[rules]]
kind = "regex"
pattern = "^\\[[^\\]]+\\]:[ \\t].*$"
tag = "markup.link"

[[rules]]
kind = "regex"
pattern = "<(?:https?://|mailto:)[^>]+>"
tag = "markup.link"

[[rules]]
kind = "regex"
pattern = "\\*\\*"
tag = "markup.strong"
context = { requires = ["markdown_strong"], pop = ["markdown_strong"] }

[[rules]]
kind = "regex"
pattern = "(?:^|[^A-Za-z0-9_])__[^_\\n]+__"
tag = "markup.strong"

[[rules]]
kind = "regex"
pattern = "\\*\\*"
tag = "markup.strong"
context = { push = ["markdown_strong"] }

[[rules]]
kind = "regex"
pattern = "[^*\\n]+"
tag = "markup.strong.text"
context = { requires = ["markdown_strong"] }

[[rules]]
kind = "regex"
pattern = "(?:^|[^A-Za-z0-9_])_[^_\\n]+_"
tag = "markup.emphasis"

[[rules]]
kind = "regex"
pattern = "\\*"
tag = "markup.emphasis"
context = { requires = ["markdown_emphasis"], pop = ["markdown_emphasis"] }

[[rules]]
kind = "regex"
pattern = "\\*"
tag = "markup.emphasis"
context = { push = ["markdown_emphasis"] }

[[rules]]
kind = "regex"
pattern = "[^*\\n]+"
tag = "markup.emphasis.text"
context = { requires = ["markdown_emphasis"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "markup.code.inline"
context = { requires = ["markdown_inline_code"], pop = ["markdown_inline_code"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "markup.code.inline"
context = { push = ["markdown_inline_code"] }

[[rules]]
kind = "regex"
pattern = "[^`\\n]+"
tag = "markup.code.inline.text"
context = { requires = ["markdown_inline_code"] }
