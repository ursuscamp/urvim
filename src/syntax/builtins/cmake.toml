[metadata]
name = "cmake"
display_name = "CMake"
alias = ["cmakelists"]
filename = ["^(?:cmakelists\\.txt|cmake)$"]
shebang = []

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "\\]\\]"
tag = "string"
context = { requires = ["cmake_bracket_string"], pop = ["cmake_bracket_string"] }

[[rules]]
kind = "regex"
pattern = "\\[\\["
tag = "string"
context = { push = ["cmake_bracket_string"] }

[[rules]]
kind = "regex"
pattern = "[^\\]\\n]+"
tag = "string"
context = { requires = ["cmake_bracket_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["cmake_string"], pop = ["cmake_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["cmake_string"] }

[[rules]]
kind = "regex"
pattern = "\\$\\{[A-Za-z_][A-Za-z0-9_]*\\}"
tag = "variable"
context = { requires = ["cmake_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n$]+"
tag = "string"
context = { requires = ["cmake_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["cmake_string"] }

[[rules]]
kind = "regex"
pattern = "\\b(?:add_custom_command|add_custom_target|add_definitions|add_executable|add_library|cmake_minimum_required|endif|else|elseif|endforeach|function|foreach|if|include|macro|message|project|return|set|target_include_directories|target_link_libraries)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:OFF|TRUE|FALSE|YES|NO|IGNORE|NOTFOUND)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "[()\\[\\],]"
tag = "punctuation"
