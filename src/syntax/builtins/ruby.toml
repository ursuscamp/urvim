[metadata]
name = "ruby"
display_name = "Ruby"
alias = ["rb"]
filename = ["\\.rb$"]
shebang = ["^#!.*\\bruby(?:[0-9.]+)?(?:\\s|$)"]
comment_prefix = "#"
glyph = ""
glyph_color = "#701516"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "<<(?:-|~)?\\s*['\"`]?(\\w+)['\"`]?"
tag = "string.escape"
context = { push = [{ name = "ruby_heredoc", capture = 1 }, "ruby_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "^[ \\t]*([A-Za-z_][A-Za-z0-9_]*)[ \\t]*$"
tag = "string.escape"
context = { requires = ["ruby_heredoc"], payload_match = { name = "ruby_heredoc", capture = 1 }, pop = ["ruby_heredoc", "ruby_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = ".+"
tag = "string.heredoc"
context = { requires = ["ruby_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { push = ["ruby_triple_double"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { requires = ["ruby_triple_double"], pop = ["ruby_triple_double"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\n]+"
tag = "string"
context = { requires = ["ruby_triple_double"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["ruby_triple_double"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["ruby_double_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["ruby_double_string"], pop = ["ruby_double_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["ruby_double_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["ruby_double_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["ruby_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["ruby_single_string"], pop = ["ruby_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\\\n]+"
tag = "string"
context = { requires = ["ruby_single_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["ruby_single_string"] }

[[rules]]
kind = "regex"
pattern = ":[A-Za-z_][A-Za-z0-9_!?=]*"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "(?:\\$[A-Za-z_][A-Za-z0-9_]*|@@[A-Za-z_][A-Za-z0-9_]*|@[A-Za-z_][A-Za-z0-9_]*)"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\\b(?:BEGIN|END|alias|and|begin|break|case|class|def|defined\\?|do|else|elsif|end|ensure|false|for|if|in|module|next|nil|not|or|redo|rescue|retry|return|self|super|then|true|undef|unless|until|when|while|yield)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|null|true|nil|self)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_]*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|==|!=|<=|>=|=>|\\|\\||&&|\\+\\+|--|[+\\-*/%=&|!<>^~?:.])"
tag = "operator"
