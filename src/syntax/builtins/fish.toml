[metadata]
name = "fish"
display_name = "Fish"
alias = ["fish-shell"]
filename = ["\\.fish$"]
shebang = ["^#!.*\\bfish(?:\\s|$)"]

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["fish_string"], pop = ["fish_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["fish_string"] }

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"
context = { requires = ["fish_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n$]+"
tag = "string"
context = { requires = ["fish_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["fish_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["fish_single_string"], pop = ["fish_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["fish_single_string"] }

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"
context = { requires = ["fish_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\\n$]+"
tag = "string"
context = { requires = ["fish_single_string"] }

[[rules]]
kind = "regex"
pattern = "\\("
tag = "punctuation"
context = { push = ["fish_subshell"] }

[[rules]]
kind = "injection"
selector = { name = "fish" }
fallback = "unstyled"
context = { requires = ["fish_subshell"] }

[[rules]]
kind = "regex"
pattern = "\\)"
tag = "punctuation"
context = { requires = ["fish_subshell"], pop = ["fish_subshell"] }

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b(?:and|begin|break|case|continue|else|end|for|function|if|not|or|return|switch|while)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:cd|echo|math|set|source|status|string|test)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:true|false)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\];]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:==|!=|<=|>=|&&|\\|\\||[+\\-*/%=&|!<>^~?:])"
tag = "operator"
