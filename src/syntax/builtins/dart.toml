[metadata]
name = "dart"
display_name = "Dart"
alias = ["dartlang"]
filename = ["\\.dart$"]
shebang = ["^#!.*\\bdart(?:\\s|$)"]
comment_prefix = "//"
glyph = ""
glyph_color = "#00B4AB"

[[rules]]
kind = "regex"
pattern = "//.*$"
tag = "comment.line"

[[rules]]
kind = "regex"
pattern = "\\*/"
tag = "comment.block"
context = { requires = ["dart_block_comment"], pop = ["dart_block_comment"] }

[[rules]]
kind = "regex"
pattern = "/\\*"
tag = "comment.block"
context = { push = ["dart_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { requires = ["dart_triple_double"], pop = ["dart_triple_double"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { push = ["dart_triple_double"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["dart_triple_double"] }

[[rules]]
kind = "regex"
pattern = "'''"
tag = "string"
context = { requires = ["dart_triple_single"], pop = ["dart_triple_single"] }

[[rules]]
kind = "regex"
pattern = "'''"
tag = "string"
context = { push = ["dart_triple_single"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\]+"
tag = "string"
context = { requires = ["dart_triple_single"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["dart_string"], pop = ["dart_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["dart_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["dart_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["dart_single_string"], pop = ["dart_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["dart_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\\\n]+"
tag = "string"
context = { requires = ["dart_single_string"] }

[[rules]]
kind = "regex"
pattern = "r\"(?:[^\"\\\\\\n]|\\\\.)*\""
tag = "string"

[[rules]]
kind = "regex"
pattern = "\\b(?:0x[0-9A-Fa-f_]+|0o[0-7_]+|0b[01_]+|\\d[\\d_]*(?:\\.\\d[\\d_]*)?(?:[eE][+-]?\\d[\\d_]*)?)\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "^\\s*@[_A-Za-z][A-Za-z0-9_]*"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:abstract|as|async|await|break|case|catch|class|const|continue|covariant|default|deferred|do|else|enum|export|extends|extension|external|factory|false|final|finally|for|get|hide|if|implements|import|in|interface|is|late|library|mixin|new|null|on|operator|part|required|rethrow|return|set|show|static|super|switch|this|throw|true|try|typedef|var|void|while|with|yield)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:bool|double|int|num|Object|String|List|Map|Set|Future|Iterable|Never|Record|Symbol|Function|dynamic|var)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|null|true)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_]*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|!==|==|!=|<=|>=|=>|\\?\\?|\\?\\.|\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
