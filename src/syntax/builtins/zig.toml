[metadata]
name = "zig"
display_name = "Zig"
alias = ["ziglang"]
filename = ["\\.zig$"]
shebang = ["^#!.*\\bzig(?:\\s|$)"]
comment_prefix = "//"
glyph = ""
glyph_color = "#f7a41d"

[[rules]]
kind = "regex"
pattern = "//.*$"
tag = "comment.line"

[[rules]]
kind = "regex"
pattern = "\\*/"
tag = "comment.block"
context = { requires = ["zig_block_comment"], pop = ["zig_block_comment"] }

[[rules]]
kind = "regex"
pattern = "/\\*"
tag = "comment.block"
context = { push = ["zig_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["zig_string"], pop = ["zig_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["zig_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["zig_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["zig_string"] }

[[rules]]
kind = "regex"
pattern = "'(?:[^'\\\\\\n]|\\\\.)'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:align|allowzero|and|asm|async|await|break|callconv|catch|comptime|const|continue|defer|else|enum|errdefer|export|extern|fn|for|if|inline|noinline|or|orelse|packed|pub|return|switch|test|threadlocal|try|union|unreachable|usingnamespace|var|volatile|while)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:bool|anyerror|anyopaque|comptime_float|comptime_int|f16|f32|f64|i8|i16|i32|i64|i128|isize|u8|u16|u32|u64|u128|usize|void|type|noreturn)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|null|true|undefined)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "@[A-Za-z_][A-Za-z0-9_]*"
tag = "function.macro"

[[rules]]
kind = "regex"
pattern = "\\b[A-Za-z_][A-Za-z0-9_]*\\b"
lookahead = "\\s*\\("
tag = "function"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:==|!=|<=|>=|\\+\\+|--|[+\\-*/%=&|!<>^~?:])"
tag = "operator"
