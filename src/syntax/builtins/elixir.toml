[metadata]
name = "elixir"
display_name = "Elixir"
alias = ["ex"]
filename = ["\\.(ex|exs)$"]
shebang = ["^#!.*\\b(?:elixir|iex)(?:\\s|$)"]
comment_prefix = "#"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { requires = ["elixir_triple_string"], pop = ["elixir_triple_string"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { push = ["elixir_triple_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["elixir_triple_string"] }

[[rules]]
kind = "regex"
pattern = "'''"
tag = "string"
context = { requires = ["elixir_single_triple"], pop = ["elixir_single_triple"] }

[[rules]]
kind = "regex"
pattern = "'''"
tag = "string"
context = { push = ["elixir_single_triple"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\]+"
tag = "string"
context = { requires = ["elixir_single_triple"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["elixir_string"], pop = ["elixir_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["elixir_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["elixir_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["elixir_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["elixir_single_string"], pop = ["elixir_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["elixir_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\\n]+"
tag = "string"
context = { requires = ["elixir_single_string"] }

[[rules]]
kind = "regex"
pattern = ":[A-Za-z_][A-Za-z0-9_!?=]*"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "@[A-Za-z_][A-Za-z0-9_!?=]*"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:def|defp|defmacro|defmodule|do|end|fn|if|unless|case|cond|with|receive|after|try|catch|rescue|raise|quote|unquote|import|alias|require|use|when|for|in|and|or|not|xor)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|nil|true)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:0x[0-9A-Fa-f_]+|0o[0-7_]+|0b[01_]+|\\d[\\d_]*(?:\\.\\d[\\d_]*)?(?:[eE][+-]?\\d[\\d_]*)?)\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_]*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|==|!=|<=|>=|->|<-|<\\-|\\|>|\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
