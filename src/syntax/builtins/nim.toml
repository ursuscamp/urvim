[metadata]
name = "nim"
display_name = "Nim"
alias = ["nimlang"]
filename = ["\\.nim$"]
shebang = ["^#!.*\\bnim(?:\\s|$)"]
comment_prefix = "#"
glyph = ""
glyph_color = "#ffc200"

[[rules]]
kind = "regex"
pattern = "##.*$"
tag = "comment.documentation"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment.line"

[[rules]]
kind = "regex"
pattern = "\\]#"
tag = "comment.block"
context = { requires = ["nim_block_comment"], pop = ["nim_block_comment"] }

[[rules]]
kind = "regex"
pattern = "#\\["
tag = "comment.block"
context = { push = ["nim_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { requires = ["nim_triple_string"], pop = ["nim_triple_string"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { push = ["nim_triple_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["nim_triple_string"] }

[[rules]]
kind = "regex"
pattern = "r\"(?:[^\"\\\\\\n]|\\\\.)*\""
tag = "string"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["nim_string"], pop = ["nim_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["nim_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["nim_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["nim_string"] }

[[rules]]
kind = "regex"
pattern = "'(?:[^'\\\\\\n]|\\\\.)'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:addr|and|as|asm|bind|block|break|case|cast|concept|const|continue|converter|defer|discard|distinct|div|do|elif|else|enum|except|export|finally|for|from|func|if|import|in|include|interface|is|isnot|iterator|let|macro|method|mixin|mod|nil|not|object|of|or|out|proc|ptr|raise|ref|return|shl|shr|static|template|try|tuple|type|using|var|when|while|xor)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:bool|char|cstring|float|float32|float64|int|int8|int16|int32|int64|uint|uint8|uint16|uint32|uint64|string|seq|array|set|table|Option|Result)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|nil|true)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\{\\.[^\\n]*\\.\\}"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_]*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:=>|->|\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
