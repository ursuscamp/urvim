[metadata]
name = "ocaml"
display_name = "OCaml"
alias = ["ml"]
filename = ["\\.(ml|mli)$"]
shebang = ["^#!.*\\b(?:ocaml|utop)(?:\\s|$)"]
glyph = ""
glyph_color = "#ef7a08"

[[rules]]
kind = "regex"
pattern = "\\*\\)"
tag = "comment.block"
context = { requires = ["ocaml_comment"], pop = ["ocaml_comment"] }

[[rules]]
kind = "regex"
pattern = "\\(\\*"
tag = "comment.block"
context = { push = ["ocaml_comment"] }

[[rules]]
kind = "regex"
pattern = "[^*]+"
tag = "comment.block"
context = { requires = ["ocaml_comment"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["ocaml_string"], pop = ["ocaml_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["ocaml_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["ocaml_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["ocaml_string"] }

[[rules]]
kind = "regex"
pattern = "'(?:[^'\\\\\\n]|\\\\.)'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:and|as|assert|asr|begin|class|constraint|do|done|downto|else|end|exception|external|for|fun|function|functor|if|in|include|inherit|initializer|land|lazy|let|lor|lsl|lsr|lxor|match|method|mod|module|mutable|new|object|of|open|or|private|rec|sig|struct|then|to|try|type|val|virtual|when|while|with)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:bool|char|float|int|string|unit|array|list|option|result|float32|int64|nativeint|bytes)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|true)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:0x[0-9A-Fa-f_]+|0o[0-7_]+|0b[01_]+|\\d[\\d_]*(?:\\.\\d[\\d_]*)?(?:[eE][+-]?\\d[\\d_]*)?)\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_']*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:->|<-|:=|=|<>|::|\\|\\||&&|[+\\-*/%=&|!<>^~?:.])"
tag = "operator"
