[metadata]
name = "erlang"
display_name = "Erlang"
alias = ["erl"]
filename = ["\\.erl$"]
shebang = ["^#!.*\\b(?:erl|escript)(?:\\s|$)"]
glyph = ""
glyph_color = "#b83998"

[[rules]]
kind = "regex"
pattern = "%.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["erlang_string"], pop = ["erlang_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["erlang_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["erlang_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["erlang_string"] }

[[rules]]
kind = "regex"
pattern = "'(?:[^'\\\\\\n]|\\\\.)*'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\?[A-Z_][A-Z0-9_]*"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "-(?:module|export|import|compile|define|record|behaviour|behavior|include|include_lib)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:after|and|band|begin|case|catch|div|end|fun|if|not|of|or|orelse|receive|rem|try|when|xor)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|true|undefined|ok|error)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:0x[0-9A-Fa-f_]+|0o[0-7_]+|0b[01_]+|\\d[\\d_]*(?:\\.\\d[\\d_]*)?)\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_]*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:->|<-|=>|:=|=:=|=/=|==|/=|<=|>=|\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
