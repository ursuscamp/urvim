[metadata]
name = "fsharp"
display_name = "F#"
alias = ["fs"]
filename = ["\\.(fs|fsi|fsx)$"]
shebang = ["^#!.*\\b(?:fsharpi|fsi)(?:\\s|$)"]
comment_prefix = "//"
glyph = ""
glyph_color = "#b845fc"

[[rules]]
kind = "regex"
pattern = "//.*$"
tag = "comment.line"

[[rules]]
kind = "regex"
pattern = "\\*\\)"
tag = "comment.block"
context = { requires = ["fsharp_block_comment"], pop = ["fsharp_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\\(\\*"
tag = "comment.block"
context = { push = ["fsharp_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { requires = ["fsharp_triple_string"], pop = ["fsharp_triple_string"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { push = ["fsharp_triple_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["fsharp_triple_string"] }

[[rules]]
kind = "regex"
pattern = "@\"(?:[^\"]|\"\")*\""
tag = "string"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["fsharp_string"], pop = ["fsharp_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["fsharp_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["fsharp_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["fsharp_string"] }

[[rules]]
kind = "regex"
pattern = "'(?:[^'\\\\\\n]|\\\\.)'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:0x[0-9A-Fa-f_]+|0b[01_]+|\\d[\\d_]*(?:\\.\\d[\\d_]*)?(?:[eE][+-]?\\d[\\d_]*)?[fFmMlL]?)\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b(?:abstract|and|as|assert|base|begin|class|default|delegate|do|done|downcast|downto|else|end|exception|extern|false|finally|for|fun|function|global|if|in|inherit|inline|interface|internal|lazy|let|match|member|module|mutable|namespace|new|not|null|of|open|or|override|private|public|rec|return|sig|static|struct|then|to|true|try|type|upcast|use|val|void|when|while|yield)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:bool|byte|char|decimal|double|float|int|int16|int32|int64|nativeint|sbyte|single|string|uint16|uint32|uint64|unativeint|unit|obj|option|seq|list|array|Map|Set)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|null|true)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_']*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:=>|->|<-|\\|>|\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
