[metadata]
name = "shell"
display_name = "Shell"
alias = ["sh"]
filename = ["\\.sh$", "^procfile$"]
shebang = ["^#!.*\\bsh(?:\\s|$)"]
comment_prefix = "#"
glyph = ""
glyph_color = "#89e051"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "<<-?\\s*['\"]?([A-Za-z_][A-Za-z0-9_]*)['\"]?"
tag = "string.escape"
context = { push = [{ name = "shell_heredoc", capture = 1 }, "shell_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "^([A-Za-z_][A-Za-z0-9_]*)[ \\t]*$"
tag = "string.escape"
context = { requires = ["shell_heredoc"], payload_match = { name = "shell_heredoc", capture = 1 }, pop = ["shell_heredoc", "shell_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = ".+"
tag = "string.heredoc"
context = { requires = ["shell_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "\\$'"
tag = "string"
context = { push = ["shell_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["shell_ansi_single_quoted"], pop = ["shell_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\]+"
tag = "string"
context = { requires = ["shell_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["shell_ansi_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["shell_single_quoted"], pop = ["shell_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["shell_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "[^']+"
tag = "string"
context = { requires = ["shell_single_quoted"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["shell_double_quoted"], pop = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$\\{[A-Za-z_][A-Za-z0-9_]*(?::[^}]*)?\\}"
tag = "variable"
context = { requires = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$\\(\\([^)]+\\)\\)"
tag = "punctuation"
context = { requires = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$\\([^)]+\\)"
tag = "punctuation"
context = { requires = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"
context = { requires = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\$]+"
tag = "string"
context = { requires = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["shell_double_quoted"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "punctuation"
context = { push = ["shell_backtick"] }

[[rules]]
kind = "regex"
pattern = "`"
tag = "punctuation"
context = { requires = ["shell_backtick"], pop = ["shell_backtick"] }

[[rules]]
kind = "regex"
pattern = "[^`\\\\]+"
tag = "string"
context = { requires = ["shell_backtick"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["shell_backtick"] }

[[rules]]
kind = "injection"
context = { requires = ["shell_backtick"] }
selector = { name = "shell" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "\\$\\("
tag = "punctuation"
context = { push = ["shell_command_sub"] }

[[rules]]
kind = "regex"
pattern = "\\)"
tag = "punctuation"
context = { requires = ["shell_command_sub"], pop = ["shell_command_sub"] }

[[rules]]
kind = "regex"
pattern = "[^\\)\\\\]+"
tag = "string"
context = { requires = ["shell_command_sub"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["shell_command_sub"] }

[[rules]]
kind = "injection"
context = { requires = ["shell_command_sub"] }
selector = { name = "shell" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "\\$\\(\\("
tag = "punctuation"
context = { push = ["shell_arithmetic_sub"] }

[[rules]]
kind = "regex"
pattern = "\\)\\)"
tag = "punctuation"
context = { requires = ["shell_arithmetic_sub"], pop = ["shell_arithmetic_sub"] }

[[rules]]
kind = "regex"
pattern = "[^\\)\\\\]+"
tag = "string"
context = { requires = ["shell_arithmetic_sub"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string"
context = { requires = ["shell_arithmetic_sub"] }

[[rules]]
kind = "injection"
context = { requires = ["shell_arithmetic_sub"] }
selector = { name = "shell" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\[\\[|\\]\\]|\\(\\(|\\)\\)"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:case|do|done|elif|else|esac|fi|for|function|if|in|then|until|while)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:true|false|null)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b(?:env|alias|export|local|readonly|set)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\];]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:==|!=|<=|>=|[+\\-*/%=&|!<>^~?*])"
tag = "operator"
