[metadata]
name = "yaml"
display_name = "YAML"
alias = ["yml"]
filename = ["\\.(yaml|yml)$"]
shebang = []

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "^%[A-Za-z]+.*$"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "^\\s*[A-Za-z0-9_-]+:\\s*[>|][+-]?[0-9]*\\s*$"
tag = "string"

[[rules]]
kind = "regex"
pattern = "^\\s{2,}.+$"
tag = "string"

[[rules]]
kind = "regex"
pattern = "^\\s*[A-Za-z0-9_-]+:"
tag = "variable.property"

[[rules]]
kind = "regex"
pattern = "\\s*(?:&[A-Za-z0-9_-]+|\\*[A-Za-z0-9_-]+|![A-Za-z0-9_-]+)"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["yaml_double_string"], pop = ["yaml_double_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["yaml_double_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["yaml_double_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["yaml_double_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["yaml_single_string"], pop = ["yaml_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^']+"
tag = "string"
context = { requires = ["yaml_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["yaml_single_string"] }

[[rules]]
kind = "regex"
pattern = "\\b(?:true|false|null|yes|no|on|off)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:_?\\d)*\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\s*[^#\\n\"'|>{&*!][^#\\n]*$"
tag = "string"

[[rules]]
kind = "regex"
pattern = "[:\\[\\]\\{\\},?-]"
tag = "punctuation"
