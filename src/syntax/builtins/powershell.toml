[metadata]
name = "powershell"
display_name = "PowerShell"
alias = ["pwsh"]
filename = ["\\.(ps1|psm1|psd1)$"]
shebang = ["^#!.*\\b(?:pwsh|powershell)(?:\\s|$)"]
comment_prefix = "#"
glyph = ""
glyph_color = "#5391fe"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment"

[[rules]]
kind = "regex"
pattern = "\"@"
tag = "string"
context = { requires = ["ps_string"], pop = ["ps_string"] }

[[rules]]
kind = "regex"
pattern = "@\""
tag = "string"
context = { push = ["ps_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\]+"
tag = "string"
context = { requires = ["ps_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["ps_string"] }

[[rules]]
kind = "regex"
pattern = "'@"
tag = "string"
context = { requires = ["ps_single_string"], pop = ["ps_single_string"] }

[[rules]]
kind = "regex"
pattern = "@'"
tag = "string"
context = { push = ["ps_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\\n]+"
tag = "string"
context = { requires = ["ps_single_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["ps_inline_string"], pop = ["ps_inline_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["ps_inline_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["ps_inline_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["ps_inline_single"], pop = ["ps_inline_single"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["ps_inline_single"] }

[[rules]]
kind = "regex"
pattern = "[^'\\n]+"
tag = "string"
context = { requires = ["ps_inline_single"] }

[[rules]]
kind = "regex"
pattern = "\\$(?:true|false|null)"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\\b(?:class|enum|filter|function|if|elseif|else|foreach|for|while|do|until|switch|return|param|begin|process|end|try|catch|finally|throw|break|continue|default|in|not|and|or|where)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\[[A-Za-z_][A-Za-z0-9_\\.]*\\]"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|==|!=|<=|>=|\\+\\+|--|[+\\-*/%=&|!<>^~?])"
tag = "operator"
