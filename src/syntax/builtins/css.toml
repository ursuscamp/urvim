[metadata]
name = "css"
display_name = "CSS"
alias = ["css3"]
filename = ["\\.css$"]
shebang = []

[[rules]]
kind = "regex"
pattern = "/\\*"
tag = "comment"
context = { push = ["css_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*/"
tag = "comment"
context = { requires = ["css_comment"], pop = ["css_comment"] }

[[rules]]
kind = "regex"
pattern = "[^*]+"
tag = "comment"
context = { requires = ["css_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*"
tag = "comment"
context = { requires = ["css_comment"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["css_double_string"], pop = ["css_double_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["css_single_string"], pop = ["css_single_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["css_double_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["css_double_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "punctuation"
context = { requires = ["css_single_string"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["css_single_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\"\\\\]+"
tag = "string"
context = { requires = ["css_double_string"] }

[[rules]]
kind = "regex"
pattern = "[^'\"\\\\]+"
tag = "string"
context = { requires = ["css_single_string"] }

[[rules]]
kind = "regex"
pattern = "#[0-9A-Fa-f]{3,8}\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "^\\s*@[_A-Za-z-][A-Za-z0-9_-]*"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "^[^@{}][^{}]*\\{"
tag = "type"

[[rules]]
kind = "regex"
pattern = "^\\s*[A-Za-z-][A-Za-z0-9-]*:"
tag = "variable.property"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?(?:px|rem|em|vh|vw|vmin|vmax|%|deg|s|ms)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "[{}:;(),]"
tag = "punctuation"
