[metadata]
name = "rust"
display_name = "Rust"
alias = ["rs"]
filename = ["\\.rs$"]
shebang = []
comment_prefix = "//"
glyph = ""
glyph_color = "#dea584"

[[rules]]
kind = "regex"
pattern = "///.*$"
tag = "comment.documentation"

[[rules]]
kind = "regex"
pattern = "//!.*$"
tag = "comment.documentation"

[[rules]]
kind = "regex"
pattern = "//.*$"
tag = "comment.line"

[[rules]]
kind = "regex"
pattern = "/\\*\\*"
tag = "comment.documentation"
context = { push = ["rust_doc_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*/"
tag = "comment.documentation"
context = { requires = ["rust_doc_comment"], pop = ["rust_doc_comment"] }

[[rules]]
kind = "regex"
pattern = "[^*\\n]+"
tag = "comment.documentation"
context = { requires = ["rust_doc_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*"
tag = "comment.documentation"
context = { requires = ["rust_doc_comment"] }

[[rules]]
kind = "regex"
pattern = "/\\*"
tag = "comment.block"
context = { push = ["rust_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*/"
tag = "comment.block"
context = { requires = ["rust_block_comment"], pop = ["rust_block_comment"] }

[[rules]]
kind = "regex"
pattern = "[^*\\n]+"
tag = "comment.block"
context = { requires = ["rust_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*"
tag = "comment.block"
context = { requires = ["rust_block_comment"] }

[[rules]]
kind = "regex"
pattern = "\\b[A-Za-z_][A-Za-z0-9_]*!"
tag = "function.macro"
context = { push = ["format_call"] }

[[rules]]
kind = "regex"
pattern = "\\("
tag = "punctuation"
context = { requires = ["format_call"] }

[[rules]]
kind = "regex"
pattern = "\\)"
tag = "punctuation"
context = { requires = ["format_call"], pop = ["format_call"] }

[[rules]]
kind = "regex"
pattern = "br((?:#*)?)\""
tag = "string"
context = { push = [{ name = "rust_raw_string", capture = 1 }, "rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "\"((?:#*)?)"
tag = "string"
context = { requires = ["rust_raw_string"], payload_match = { name = "rust_raw_string", capture = 1 }, pop = ["rust_raw_string", "rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "[^\"]+"
tag = "string"
context = { requires = ["rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "r((?:#*)?)\""
tag = "string"
context = { push = [{ name = "rust_raw_string", capture = 1 }, "rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "\"((?:#*)?)"
tag = "string"
context = { requires = ["rust_raw_string"], payload_match = { name = "rust_raw_string", capture = 1 }, pop = ["rust_raw_string", "rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "[^\"]+"
tag = "string"
context = { requires = ["rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["rust_raw_string_body"] }

[[rules]]
kind = "regex"
pattern = "b\""
tag = "string"
context = { push = ["rust_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["rust_string"], pop = ["rust_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["rust_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string.escape"
context = { requires = ["rust_string"] }

[[rules]]
kind = "regex"
pattern = "b'(?:[^'\\\\\\n]|\\\\.)'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "'(?:[^'\\\\\\n]|\\\\.)'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "b'"
tag = "constant"
context = { push = ["rust_byte_char"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "constant"
context = { requires = ["rust_byte_char"], pop = ["rust_byte_char"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\\\n]+"
tag = "constant"
context = { requires = ["rust_byte_char"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "constant"
context = { requires = ["rust_byte_char"] }

[[rules]]
kind = "regex"
pattern = "\\'"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "'[A-Za-z_][A-Za-z0-9_]*:"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "'[A-Za-z_][A-Za-z0-9_]*\\b"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "#!?\\["
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "\\b0[bB][01_]+(?:_?[iu](?:8|16|32|64|128|size))?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b0[oO][0-7_]+(?:_?[iu](?:8|16|32|64|128|size))?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b0[xX][0-9A-Fa-f_]+(?:_?[iu](?:8|16|32|64|128|size))?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b(?:\\d[\\d_]*(?:\\.\\d[\\d_]*)?(?:[eE][+-]?\\d[\\d_]*)?|\\.\\d[\\d_]*(?:[eE][+-]?\\d[\\d_]*)?)(?:_?(?:f32|f64|usize|isize|u8|u16|u32|u64|u128|i8|i16|i32|i64|i128))?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b(?:as|async|await|break|const|continue|crate|dyn|else|enum|extern|false|fn|for|if|impl|in|let|loop|match|mod|move|mut|pub|ref|return|self|Self|static|struct|super|trait|true|type|unsafe|use|where|while)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:None|Some|Ok|Err)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\{\\}\\n]+"
tag = "string"
context = { requires = ["format_string"] }

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Z0-9_]*\\b"
tag = "variable.global"

[[rules]]
kind = "regex"
pattern = "\\b(?:Option|Result|String|Vec|HashMap|Path|PathBuf|[A-Z][A-Za-z0-9]*)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:crate|self|super|Self|[A-Za-z_][A-Za-z0-9_]*)\\b"
lookahead = "\\s*::"
tag = "namespace"

[[rules]]
kind = "regex"
pattern = "\\b[A-Za-z_][A-Za-z0-9_]*\\b"
lookahead = "\\s*\\("
tag = "function"

[[rules]]
kind = "regex"
pattern = "\\b[A-Za-z_][A-Za-z0-9_]*\\b"
lookahead = "\\s*:"
tag = "variable.global"

[[rules]]
kind = "regex"
pattern = "[{]{2}"
tag = "string.escape"
context = { requires = ["format_string"] }

[[rules]]
kind = "regex"
pattern = "[}]{2}"
tag = "string.escape"
context = { requires = ["format_string"] }

[[rules]]
kind = "regex"
pattern = "\\{"
tag = "punctuation"
context = { requires = ["format_string"], pop = ["format_string"], push = ["format_expr"] }

[[rules]]
kind = "injection"
context = { requires = ["format_expr"] }
selector = { name = "rust" }
fallback = "unstyled"

[[rules]]
kind = "regex"
pattern = "\\}"
tag = "punctuation"
context = { requires = ["format_expr"], pop = ["format_expr"], push = ["format_string"] }

[[rules]]
kind = "regex"
pattern = "\\b(?:r#)?[a-z_][A-Za-z0-9_]*\\b"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "[()\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "[{}]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:=>|->|==|!=|<=|>=|&&|\\|\\||[+\\-*/%=&|!<>^?])"
tag = "operator"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["format_call"], pop = ["format_call"], push = ["format_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["format_string"], pop = ["format_string"] }

[[rules]]
kind = "regex"
pattern = "\\b\\d+\\b"
tag = "number"
context = { requires = ["format_string"] }

[[rules]]
kind = "regex"
pattern = ":[0-9]+"
tag = "number"
context = { requires = ["format_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string.escape"

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["rust_string"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["rust_string"], pop = ["rust_string"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["rust_string"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string.escape"
context = { requires = ["rust_string"] }
