[metadata]
name = "php"
display_name = "PHP"
alias = ["php8"]
filename = ["\\.php$"]
shebang = ["^#!.*\\bphp(?:[0-9.]+)?(?:\\s|$)"]
comment_prefix = "//"
glyph = ""
glyph_color = "#4F5D95"

[[rules]]
kind = "regex"
pattern = "//.*$"
tag = "comment.line"

[[rules]]
kind = "regex"
pattern = "#.*$"
tag = "comment.line"

[[rules]]
kind = "regex"
pattern = "/\\*"
tag = "comment.block"
context = { push = ["php_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*/"
tag = "comment.block"
context = { requires = ["php_comment"], pop = ["php_comment"] }

[[rules]]
kind = "regex"
pattern = "[^*\\n]+"
tag = "comment.block"
context = { requires = ["php_comment"] }

[[rules]]
kind = "regex"
pattern = "\\*"
tag = "comment.block"
context = { requires = ["php_comment"] }

[[rules]]
kind = "regex"
pattern = "<<<\\s*['\"]?(\\w+)['\"]?"
tag = "string.escape"
context = { push = [{ name = "php_heredoc", capture = 1 }, "php_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "^[ \\t]*([A-Za-z_][A-Za-z0-9_]*)"
tag = "string.escape"
context = { requires = ["php_heredoc"], payload_match = { name = "php_heredoc", capture = 1 }, pop = ["php_heredoc", "php_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = ".+"
tag = "string.heredoc"
context = { requires = ["php_heredoc_body"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { push = ["php_triple_double"] }

[[rules]]
kind = "regex"
pattern = "\"\"\""
tag = "string"
context = { requires = ["php_triple_double"], pop = ["php_triple_double"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\n]+"
tag = "string"
context = { requires = ["php_triple_double"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["php_triple_double"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { push = ["php_double"] }

[[rules]]
kind = "regex"
pattern = "\""
tag = "string"
context = { requires = ["php_double"], pop = ["php_double"] }

[[rules]]
kind = "regex"
pattern = "[^\"\\\\\\n]+"
tag = "string"
context = { requires = ["php_double"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string.escape"
context = { requires = ["php_double"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { push = ["php_single"] }

[[rules]]
kind = "regex"
pattern = "'"
tag = "string"
context = { requires = ["php_single"], pop = ["php_single"] }

[[rules]]
kind = "regex"
pattern = "[^'\\\\\\n]+"
tag = "string"
context = { requires = ["php_single"] }

[[rules]]
kind = "regex"
pattern = "\\\\."
tag = "string.escape"
context = { requires = ["php_single"] }

[[rules]]
kind = "regex"
pattern = "\\$[A-Za-z_][A-Za-z0-9_]*"
tag = "variable"

[[rules]]
kind = "regex"
pattern = "\\b(?:abstract|and|array|as|break|callable|case|catch|class|clone|const|continue|declare|default|die|do|echo|else|elseif|empty|enddeclare|endfor|endforeach|endif|endswitch|endwhile|eval|exit|extends|final|finally|fn|for|foreach|function|global|goto|if|implements|include|include_once|instanceof|insteadof|interface|match|namespace|new|or|print|private|protected|public|require|require_once|return|static|switch|throw|trait|try|use|var|while|xor|yield)\\b"
tag = "keyword"

[[rules]]
kind = "regex"
pattern = "\\b(?:bool|callable|class-string|false|float|int|iterable|mixed|never|null|object|parent|self|string|true|void)\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "\\b(?:false|null|true)\\b"
tag = "constant"

[[rules]]
kind = "regex"
pattern = "\\b\\d+(?:\\.\\d+)?\\b"
tag = "number"

[[rules]]
kind = "regex"
pattern = "\\b[A-Z][A-Za-z0-9_]*\\b"
tag = "type"

[[rules]]
kind = "regex"
pattern = "[(){}\\[\\],.;:]"
tag = "punctuation"

[[rules]]
kind = "regex"
pattern = "(?:===|!==|==|!=|<=|>=|=>|\\+\\+|--|[+\\-*/%=&|!<>^~?.])"
tag = "operator"
