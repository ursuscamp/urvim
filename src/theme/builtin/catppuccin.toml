name = "Catppuccin"

[palette]
bg = "#1e1e2e"
fg = "#cdd6f4"
panel = "#313244"
accent = "#cba6f7"
muted = "#6c7086"
comment = "#6c7086"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#cba6f7"
cyan = "#94e2d5"
orange = "#fab387"

[default]
fg = "fg"
bg = "bg"

[ui]
status_bar = { fg = "fg", bg = "panel", bold = true }
modified_marker = { fg = "orange", bold = true }
selection = { fg = "bg", bg = "fg" }
tab_active = { fg = "bg", bg = "accent", bold = true }
tab_inactive = { fg = "fg", bg = "panel" }
tab_scroll_indicator = { fg = "muted", bg = "bg" }
gutter = { fg = "muted", bg = "bg" }
window = { fg = "fg", bg = "bg" }

[syntax]
comment = { fg = "comment" }
"comment.todo" = { fg = "bg", bg = "accent", bold = true }
"comment.fixme" = { fg = "bg", bg = "red", bold = true }
"comment.bug" = { fg = "bg", bg = "orange", bold = true }
"comment.note" = { fg = "bg", bg = "cyan", bold = true }
constant = { fg = "orange" }
function = { fg = "blue" }
keyword = { fg = "magenta" }
markup = { fg = "accent" }
"markup.code" = { fg = "orange" }
"markup.code.inline" = { fg = "orange" }
"markup.emphasis" = { fg = "accent", italic = true }
"markup.heading" = { fg = "blue", bold = true }
"markup.link" = { fg = "cyan", underline = true }
"markup.list" = { fg = "magenta" }
"markup.quote" = { fg = "comment", italic = true }
"markup.strong" = { fg = "accent", bold = true }
"markup.thematic_break" = { fg = "muted" }
number = { fg = "yellow" }
operator = { fg = "fg" }
punctuation = { fg = "muted" }
string = { fg = "green" }
"string.escape" = { fg = "muted" }
"string.interpolation" = { fg = "accent" }
type = { fg = "cyan" }
variable = { fg = "fg" }
