name = "Dracula"

[palette]
bg = "#282a36"
fg = "#f8f8f2"
panel = "#44475a"
accent = "#bd93f9"
muted = "#6272a4"
comment = "#6272a4"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#8be9fd"
magenta = "#ff79c6"
cyan = "#8be9fd"
orange = "#ffb86c"

[default]
fg = "fg"
bg = "bg"

[ui]
status_bar = { fg = "fg", bg = "panel", bold = true }
tab_active = { fg = "bg", bg = "accent", bold = true }
tab_inactive = { fg = "fg", bg = "panel" }
tab_scroll_indicator = { fg = "muted", bg = "bg" }
gutter = { fg = "muted", bg = "bg" }
window = { fg = "fg", bg = "bg" }

[syntax]
comment = { fg = "comment" }
constant = { fg = "orange" }
function = { fg = "blue" }
keyword = { fg = "magenta" }
number = { fg = "yellow" }
operator = { fg = "fg" }
punctuation = { fg = "muted" }
string = { fg = "green" }
type = { fg = "cyan" }
variable = { fg = "fg" }
