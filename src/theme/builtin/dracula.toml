name = "Dracula"

[palette]
bg = "#282a36"
fg = "#f8f8f2"
panel = "#21222c"
selection = "#44475a"
accent = "#bd93f9"
muted = "#6272a4"
comment = "#6272a4"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#8be9fd"
magenta = "#ff79c6"
cyan = "#8be9fd"
orange = "#ffb86c"
bright_red = "#ff6e6e"
bright_green = "#69ff94"
bright_yellow = "#ffffa5"
bright_blue = "#d6acff"
bright_magenta = "#ff92df"
bright_cyan = "#a4ffff"
bright_white = "#ffffff"
visual = "#3e4452"
gutter_fg = "#4b5263"
nontext = "#3b4048"
white = "#abb2bf"
black = "#191a21"
menu = "#21222c"

[default]
fg = "fg"
bg = "bg"

[highlights]
# UI
"ui.status_bar" = { fg = "white", bg = "selection", bold = true }
"ui.status_bar.modified_marker" = { fg = "orange", bold = true }
"ui.selection" = { bg = "selection" }
"ui.window.active_line" = { bg = "selection", overlay = true }
"ui.tab.active" = { fg = "bg", bg = "accent", bold = true }
"ui.tab.inactive" = { fg = "fg", bg = "panel" }
"ui.tab.scroll_indicator" = { fg = "muted", bg = "bg" }
"ui.window.gutter" = { fg = "muted", bg = "bg" }
"ui.window.gutter.active_line" = { fg = "fg" }
"ui.window" = { fg = "fg", bg = "bg" }
"ui.window.lines" = { fg = "muted" }
"ui.window.lines.resize" = { fg = "accent", bold = true }
"ui.diagnostic.error" = { fg = "red", bold = true }
"ui.diagnostic.warning" = { fg = "yellow", bold = true }
"ui.diagnostic.info" = { fg = "cyan" }
"ui.diagnostic.hint" = { fg = "magenta" }
"ui.input.prompt" = { fg = "accent", bold = true }
"ui.input.prompt.exact" = { fg = "accent", bold = true }
"ui.input.prompt.fuzzy" = { fg = "accent", italic = true }
"ui.input.prompt.separator" = { fg = "muted" }
"ui.picker.location" = { fg = "muted" }
"ui.notification.info" = { fg = "blue" }
"ui.notification.warn" = { fg = "yellow", bold = true }
"ui.notification.error" = { fg = "red", bold = true }

# Syntax
"syntax.comment" = { fg = "comment" }
"syntax.comment.todo" = { fg = "bg", bg = "accent", bold = true }
"syntax.comment.fixme" = { fg = "bg", bg = "red", bold = true }
"syntax.comment.bug" = { fg = "bg", bg = "orange", bold = true }
"syntax.comment.note" = { fg = "bg", bg = "cyan", bold = true }
"syntax.constant" = { fg = "yellow" }
"syntax.function" = { fg = "yellow" }
"syntax.namespace" = { fg = "cyan" }
"syntax.keyword" = { fg = "cyan" }
"syntax.markup" = { fg = "fg" }
"syntax.markup.code" = { fg = "yellow" }
"syntax.markup.code.inline" = { fg = "yellow" }
"syntax.markup.emphasis" = { fg = "magenta", italic = true }
"syntax.markup.heading" = { fg = "magenta", bold = true }
"syntax.markup.link" = { fg = "cyan", underline = true }
"syntax.markup.list" = { fg = "cyan" }
"syntax.markup.quote" = { fg = "comment", italic = true }
"syntax.markup.strong" = { fg = "magenta", bold = true }
"syntax.markup.thematic_break" = { fg = "muted" }
"syntax.number" = { fg = "orange" }
"syntax.operator" = { fg = "magenta" }
"syntax.punctuation" = { fg = "fg" }
"syntax.string" = { fg = "yellow" }
"syntax.string.escape" = { fg = "cyan" }
"syntax.string.interpolation" = { fg = "accent" }
"syntax.type" = { fg = "cyan" }
"syntax.variable" = { fg = "fg" }
"syntax.variable.builtin" = { fg = "red" }
