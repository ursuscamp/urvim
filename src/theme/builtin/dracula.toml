name = "Dracula"

[palette]
bg = "#282a36"
fg = "#f8f8f2"
panel = "#44475a"
accent = "#bd93f9"
muted = "#6272a4"
comment = "#6272a4"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#8be9fd"
magenta = "#ff79c6"
cyan = "#8be9fd"
orange = "#ffb86c"

[default]
fg = "fg"
bg = "bg"

[highlights]
# UI
"ui.status_bar" = { fg = "fg", bg = "panel", bold = true }
"ui.status_bar.modified_marker" = { fg = "orange", bold = true }
"ui.selection" = { bg = "panel" }
"ui.window.active_line" = { bg = "panel", overlay = true }
"ui.tab.active" = { fg = "bg", bg = "accent", bold = true }
"ui.tab.inactive" = { fg = "fg", bg = "panel" }
"ui.tab.scroll_indicator" = { fg = "muted", bg = "bg" }
"ui.window.gutter" = { fg = "muted", bg = "bg" }
"ui.window.gutter.active_line" = { fg = "fg" }
"ui.window" = { fg = "fg", bg = "bg" }
"ui.window.lines" = { fg = "muted" }
"ui.window.lines.resize" = { fg = "accent", bold = true }

# Syntax
"syntax.comment" = { fg = "comment" }
"syntax.comment.todo" = { fg = "bg", bg = "accent", bold = true }
"syntax.comment.fixme" = { fg = "bg", bg = "red", bold = true }
"syntax.comment.bug" = { fg = "bg", bg = "orange", bold = true }
"syntax.comment.note" = { fg = "bg", bg = "cyan", bold = true }
"syntax.constant" = { fg = "orange" }
"syntax.function" = { fg = "blue" }
"syntax.namespace" = { fg = "cyan" }
"syntax.keyword" = { fg = "magenta" }
"syntax.markup" = { fg = "accent" }
"syntax.markup.code" = { fg = "orange" }
"syntax.markup.code.inline" = { fg = "orange" }
"syntax.markup.emphasis" = { fg = "accent", italic = true }
"syntax.markup.heading" = { fg = "blue", bold = true }
"syntax.markup.link" = { fg = "cyan", underline = true }
"syntax.markup.list" = { fg = "magenta" }
"syntax.markup.quote" = { fg = "comment", italic = true }
"syntax.markup.strong" = { fg = "accent", bold = true }
"syntax.markup.thematic_break" = { fg = "muted" }
"syntax.number" = { fg = "yellow" }
"syntax.operator" = { fg = "red" }
"syntax.punctuation" = { fg = "muted" }
"syntax.string" = { fg = "green" }
"syntax.string.escape" = { fg = "muted" }
"syntax.string.interpolation" = { fg = "accent" }
"syntax.type" = { fg = "accent" }
"syntax.variable" = { fg = "fg" }
