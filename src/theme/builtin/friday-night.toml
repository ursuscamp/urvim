name = "Friday Night"

[palette]
bg = 16
fg = 252
panel = 235
accent = 75
muted = 244
comment = 242
red = 203
green = 114
yellow = 221
blue = 110
magenta = 141
cyan = 80
orange = 214

[default]
fg = "fg"
bg = "bg"

[ui]
status_bar = { fg = "fg", bg = "panel", bold = true }
tab_active = { fg = "bg", bg = "accent", bold = true }
tab_inactive = { fg = "fg", bg = "panel" }
tab_scroll_indicator = { fg = "muted", bg = "bg" }
gutter = { fg = "muted", bg = "bg" }
window = { fg = "fg", bg = "bg" }

[syntax]
comment = { fg = "comment" }
constant = { fg = "orange" }
function = { fg = "blue" }
keyword = { fg = "magenta" }
number = { fg = "yellow" }
operator = { fg = "fg" }
punctuation = { fg = "muted" }
string = { fg = "green" }
type = { fg = "cyan" }
variable = { fg = "fg" }
