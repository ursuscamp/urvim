name = "Rose Pine"

[palette]
bg = "#191724"
fg = "#e0def4"
panel = "#1f1d2e"
selection = "#26233a"
accent = "#c4a7e7"
muted = "#6e6a86"
comment = "#908caa"
red = "#eb6f92"
green = "#31748f"
yellow = "#f6c177"
blue = "#9ccfd8"
magenta = "#c4a7e7"
cyan = "#9ccfd8"
orange = "#ebbcba"
base = "#191724"
surface = "#1f1d2e"
overlay = "#26233a"
text = "#e0def4"
love = "#eb6f92"
gold = "#f6c177"
rose = "#ebbcba"
pine = "#31748f"
foam = "#9ccfd8"
iris = "#c4a7e7"
leaf = "#95b1ac"
highlight_low = "#21202e"
highlight_med = "#403d52"
highlight_high = "#524f67"
subtle = "#908caa"

[default]
fg = "fg"
bg = "bg"

[highlights]
# UI
"ui.status_bar" = { fg = "fg", bg = "surface", bold = true }
"ui.status_bar.modified_marker" = { fg = "orange", bold = true }
"ui.selection" = { bg = "selection" }
"ui.window.active_line" = { bg = "highlight_low", overlay = true }
"ui.tab.active" = { fg = "bg", bg = "iris", bold = true }
"ui.tab.inactive" = { fg = "fg", bg = "surface" }
"ui.tab.scroll_indicator" = { fg = "muted", bg = "bg" }
"ui.window.gutter" = { fg = "muted", bg = "bg" }
"ui.window.gutter.active_line" = { fg = "fg" }
"ui.window" = { fg = "fg", bg = "bg" }
"ui.window.lines" = { fg = "muted" }
"ui.window.lines.resize" = { fg = "iris", bold = true }
"ui.input.prompt" = { fg = "iris", bold = true }
"ui.input.prompt.exact" = { fg = "iris", bold = true }
"ui.input.prompt.fuzzy" = { fg = "iris", italic = true }
"ui.input.prompt.separator" = { fg = "muted" }
"ui.notification.info" = { fg = "blue" }
"ui.notification.warn" = { fg = "yellow", bold = true }
"ui.notification.error" = { fg = "red", bold = true }

# Syntax
"syntax.comment" = { fg = "comment" }
"syntax.comment.todo" = { fg = "bg", bg = "iris", bold = true }
"syntax.comment.fixme" = { fg = "bg", bg = "red", bold = true }
"syntax.comment.bug" = { fg = "bg", bg = "rose", bold = true }
"syntax.comment.note" = { fg = "bg", bg = "foam", bold = true }
"syntax.constant" = { fg = "gold" }
"syntax.function" = { fg = "rose" }
"syntax.namespace" = { fg = "foam" }
"syntax.keyword" = { fg = "pine" }
"syntax.markup" = { fg = "fg" }
"syntax.markup.code" = { fg = "gold" }
"syntax.markup.code.inline" = { fg = "gold" }
"syntax.markup.emphasis" = { fg = "rose", italic = true }
"syntax.markup.heading" = { fg = "foam", bold = true }
"syntax.markup.link" = { fg = "foam", underline = true }
"syntax.markup.list" = { fg = "foam" }
"syntax.markup.quote" = { fg = "comment", italic = true }
"syntax.markup.strong" = { fg = "rose", bold = true }
"syntax.markup.thematic_break" = { fg = "muted" }
"syntax.number" = { fg = "gold" }
"syntax.operator" = { fg = "pine" }
"syntax.punctuation" = { fg = "muted" }
"syntax.string" = { fg = "gold" }
"syntax.string.escape" = { fg = "iris" }
"syntax.string.interpolation" = { fg = "foam" }
"syntax.type" = { fg = "foam" }
"syntax.variable" = { fg = "fg" }
