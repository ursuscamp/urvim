[package]
name = "urvim"
version = "0.1.0"
edition = "2024"

[dependencies]
rustix = { version = "0.38", features = ["termios", "event", "fs"] }
is-terminal = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
signal-hook = "0.3"
terminal_size = "0.2"
base64 = "0.22"
ropey = "1.6"
unicode-segmentation = "1.11"
unicode-width = "0.2"
