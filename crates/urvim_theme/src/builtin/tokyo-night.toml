name = "Tokyo Night"

[palette]
bg = "#1a1b26"
fg = "#c0caf5"
panel = "#24283b"
selection = "#292e42"
accent = "#7aa2f7"
muted = "#565f89"
comment = "#565f89"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
orange = "#ff9e64"
bg_dark = "#16161e"
bg_highlight = "#292e42"
fg_dark = "#a9b1d6"
fg_gutter = "#3b4261"
dark3 = "#545c7e"
dark5 = "#737aa2"
green1 = "#73daca"
green2 = "#41a6b5"
blue1 = "#2ac3de"
blue2 = "#0db9d7"
blue5 = "#89ddff"
blue6 = "#b4f9f8"
blue7 = "#394b70"
purple = "#9d7cd8"
red1 = "#db4b4b"
magenta2 = "#ff007c"
terminal_black = "#414868"

[default]
fg = "fg"
bg = "bg"

[highlights]
# UI
"ui.status_bar" = { fg = "fg", bg = "panel", bold = true }
"ui.status_bar.modified_marker" = { fg = "orange", bold = true }
"ui.selection" = { bg = "selection" }
"ui.window.active_line" = { bg = "panel", overlay = true }
"ui.tab.active" = { fg = "bg", bg = "accent", bold = true }
"ui.tab.inactive" = { fg = "fg", bg = "panel" }
"ui.tab.scroll_indicator" = { fg = "dark5", bg = "bg" }
"ui.window.gutter" = { fg = "fg_gutter", bg = "bg" }
"ui.window.gutter.active_line" = { fg = "fg" }
"ui.window.gutter.diff.added" = { fg = "green" }
"ui.window.gutter.diff.deleted" = { fg = "red1" }
"ui.window.gutter.diff.modified" = { fg = "orange" }
"ui.window" = { fg = "fg", bg = "bg" }
"ui.window.lines" = { fg = "fg_gutter" }
"ui.window.lines.resize" = { fg = "accent", bold = true }
"ui.virtual_text" = { fg = "muted", italic = true }
"ui.virtual_text.inlay_hint" = { fg = "muted", italic = true }
"ui.diagnostic.error" = { fg = "red", bold = true }
"ui.diagnostic.warning" = { fg = "yellow", bold = true }
"ui.diagnostic.info" = { fg = "blue" }
"ui.diagnostic.hint" = { fg = "cyan" }
"ui.input.prompt" = { fg = "accent", bold = true }
"ui.input.prompt.exact" = { fg = "accent", bold = true }
"ui.input.prompt.fuzzy" = { fg = "accent", italic = true }
"ui.picker.accent" = { fg = "accent", bold = true }
"ui.input.prompt.separator" = { fg = "fg_gutter" }
"ui.picker.location" = { fg = "dark5" }
"ui.notification.info" = { fg = "blue" }
"ui.notification.warn" = { fg = "yellow", bold = true }
"ui.notification.error" = { fg = "red", bold = true }

# Syntax
"syntax.comment" = { fg = "comment" }
"syntax.comment.todo" = { fg = "bg", bg = "magenta", bold = true }
"syntax.comment.fixme" = { fg = "bg", bg = "red", bold = true }
"syntax.comment.bug" = { fg = "bg", bg = "orange", bold = true }
"syntax.comment.note" = { fg = "bg", bg = "cyan", bold = true }
"syntax.constant" = { fg = "orange" }
"syntax.function" = { fg = "blue" }
"syntax.namespace" = { fg = "magenta" }
"syntax.keyword" = { fg = "cyan" }
"syntax.markup" = { fg = "fg" }
"syntax.markup.code" = { fg = "orange" }
"syntax.markup.code.inline" = { fg = "orange" }
"syntax.markup.emphasis" = { fg = "magenta", italic = true }
"syntax.markup.heading" = { fg = "blue", bold = true }
"syntax.markup.link" = { fg = "cyan", underline = true }
"syntax.markup.list" = { fg = "cyan" }
"syntax.markup.quote" = { fg = "comment", italic = true }
"syntax.markup.strong" = { fg = "magenta", bold = true }
"syntax.markup.thematic_break" = { fg = "fg_gutter" }
"syntax.number" = { fg = "orange" }
"syntax.operator" = { fg = "blue5" }
"syntax.punctuation" = { fg = "fg_dark" }
"syntax.string" = { fg = "green" }
"syntax.string.escape" = { fg = "magenta" }
"syntax.string.interpolation" = { fg = "blue" }
"syntax.type" = { fg = "blue1" }
"syntax.variable" = { fg = "fg" }
